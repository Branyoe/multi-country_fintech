name: bravo-dev

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       bravo_dev
      POSTGRES_USER:     bravo
      POSTGRES_PASSWORD: bravo
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=bravo psql -h localhost -U bravo -d bravo_dev -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Django API (runserver con auto-reload) ───────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: sh entrypoint.dev.sh
    env_file: ./backend/.env.dev
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A config worker --loglevel=debug --concurrency=1
    env_file: ./backend/.env.dev
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Frontend (Vite HMR) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_PROXY_TARGET=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata_dev:
