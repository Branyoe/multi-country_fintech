server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router maneja las rutas del lado del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Django Admin
    location /admin/ {
        proxy_pass         http://api:8000/admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy archivos estáticos de Django (admin CSS/JS servidos por Whitenoise)
    location /static/ {
        proxy_pass         http://api:8000/static/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy API → Django REST
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket timeline updates
    location /ws/ {
        proxy_pass         http://api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
