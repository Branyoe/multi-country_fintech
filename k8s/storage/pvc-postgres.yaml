apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: bravo
spec:
  accessModes:
    - ReadWriteOnce  # Single-node Postgres; only postgres-0 mounts this
  resources:
    requests:
      storage: 10Gi
  # storageClassName is intentionally omitted to use the cluster default.
  # Override for your cloud provider:
  #   GKE:  standard-rwo
  #   EKS:  gp3-csi
  #   AKS:  managed-premium
