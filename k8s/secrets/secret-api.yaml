# WARNING: This file is a template. Never commit real values.
# Fill in the values below and apply with: kubectl apply -f k8s/secrets/secret-api.yaml
# Consider using Sealed Secrets, External Secrets Operator, or a vault for production.
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: bravo
type: Opaque
stringData:
  # Django secret key — generate with: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
  SECRET_KEY: "CHANGE_ME"

  # Database credentials — must match POSTGRES_USER / POSTGRES_PASSWORD below
  DB_USER: "bravo"
  DB_PASSWORD: "CHANGE_ME"

  # Used by the postgres StatefulSet container (must stay in sync with DB_USER/DB_PASSWORD)
  POSTGRES_USER: "bravo"
  POSTGRES_PASSWORD: "CHANGE_ME"

  # Outgoing webhook URL — leave empty to disable
  WEBHOOK_URL: ""
